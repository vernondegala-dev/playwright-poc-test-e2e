[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "playwright-poc-test-e2e"
version = "1.0.0"
description = "Playwright + Pytest E2E Test Automation Framework with Self-Healing Agent"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "playwright>=1.50.0",
    "pytest>=8.0.0",
    "pytest-playwright>=0.5.0",
    "pytest-xdist>=3.6.0",
    "pytest-html>=4.1.0",
    "pytest-timeout>=2.3.0",
    "pytest-rerunfailures>=14.0",
    "allure-pytest>=2.13.0",
    "pyyaml>=6.0",
    "faker>=22.0.0",
    "jinja2>=3.1.0",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
timeout = 60
timeout_method = "thread"
addopts = """
    -v
    --strict-markers
    --tb=short
    --maxfail=2
    --html=reports/report.html
    --self-contained-html
    -p no:cacheprovider
"""
markers = [
    "smoke: Smoke tests (quick sanity checks)",
    "regression: Full regression test suite",
    "login: Login page related tests",
    "shop: Shopping page related tests",
    "checkout: Checkout flow tests",
    "agent_generated: Tests generated by AI Agent",
    "flaky: Tests identified as flaky, with self-healing",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(message)s"
